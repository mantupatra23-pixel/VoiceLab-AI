<!DOCTYPE html>
<html>
<head>
    <title>VoiceLab AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h1>🔥 VoiceLab AI</h1>

    <textarea id="text" placeholder="Enter your text"></textarea>

    <br><br>

    <select id="voice">
        <option value="en-US-AriaNeural">English Female</option>
        <option value="hi-IN-SwaraNeural">Hindi Female</option>
        <option value="en-US-GuyNeural">English Male</option>
        <option value="hi-IN-MadhurNeural">Hindi Male</option>
    </select>

    <br><br>

    <button onclick="generate()">🎧 Generate Voice</button>

    <br><br>

    <audio id="audio" controls style="display:none;"></audio>

    <br>

    <a id="download" style="display:none;" download="voice.mp3">⬇ Download</a>

    <br><br>

    <button onclick="buyCredits()">💳 Buy Credits ₹49</button>

</div>

<script>

async function generate(){
    let text = document.getElementById("text").value;
    let voice = document.getElementById("voice").value;

    let res = await fetch("/generate",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text:text, voice:voice})
    });

    if(res.status != 200){
        alert("Login karo ya credits khatam ❌");
        return;
    }

    let blob = await res.blob();
    let url = URL.createObjectURL(blob);

    let audio = document.getElementById("audio");
    audio.src = url;
    audio.style.display = "block";

    let link = document.getElementById("download");
    link.href = url;
    link.style.display = "block";
}

async function buyCredits(){
    let res = await fetch("/create-order",{
        method:"POST"
    });

    let data = await res.json();
    alert("Order Created ₹49 (Demo)");
}

</script>

</body>
</html>
