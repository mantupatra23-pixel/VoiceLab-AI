<!DOCTYPE html>
<html>
<head>
    <title>VoiceLab AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">
    <h1>🔥 VoiceLab AI</h1>

    <input id="text" placeholder="Enter your text">

    <select id="voice">
        <option value="female_india">Female India</option>
        <option value="male_india">Male India</option>
        <option value="hindi_female">Hindi Female</option>
        <option value="hindi_male">Hindi Male</option>
    </select>

    <button onclick="generate()">🎧 Generate Voice</button>

    <a id="download" style="display:none;">⬇ Download</a>

    <br><br>

    <button onclick="buyCredits()">💳 Buy Credits</button>
</div>

<script>
async function generate(){
    let text = document.getElementById("text").value;

    let res = await fetch("/generate",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text:text})
    });

    if(res.status != 200){
        alert("Login or No Credits");
        return;
    }

    let blob = await res.blob();
    let url = URL.createObjectURL(blob);

    let link = document.getElementById("download");
    link.href = url;
    link.style.display = "block";
}

async function buyCredits(){
    let res = await fetch("/create-order",{
        method:"POST"
    });

    let data = await res.json();
    alert("Order Created ₹49 (Demo)");
}
</script>

</body>
</html>
