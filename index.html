<!DOCTYPE html>
<html>
<head>
    <title>🔥 VoiceLab AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🔥 VoiceLab AI</h1>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <div>
        <button onclick="register()">Register</button>
        <button onclick="login()">Login</button>
    </div>

    <textarea id="text" placeholder="Enter your text"></textarea>

    <select id="voice">
        <option value="female_india">English Female</option>
        <option value="male_india">English Male</option>
        <option value="hindi_female">Hindi Female</option>
        <option value="hindi_male">Hindi Male</option>
    </select>

    <div>
        <button onclick="generate()">🎧 Generate Voice</button>
        <button onclick="buy()">💳 Buy Credits ₹49</button>
    </div>

    <audio id="audio" controls></audio>
</div>

<script src="script.js"></script>
</body>
</html>
